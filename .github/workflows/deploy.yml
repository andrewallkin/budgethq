name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          # Values for generating .env on the VPS
          ENV_POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          ENV_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ENV_POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          ENV_POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          ENV_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENV_BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          ENV_FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          ENV_GCP_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_CREDENTIALS }}
          ENV_GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          ENV_GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          ENV_GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          ENV_BACKUP_RETENTION_DAYS: ${{ secrets.BACKUP_RETENTION_DAYS }}
          ENV_BACKUP_SCHEDULE_HOUR: ${{ secrets.BACKUP_SCHEDULE_HOUR }}
          ENV_BACKUP_SCHEDULE_MINUTE: ${{ secrets.BACKUP_SCHEDULE_MINUTE }}
          ENV_AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
        run: |
          ssh -t -i ~/.ssh/id_rsa -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=50 -o ServerAliveCountMax=10 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<EOF
          set -euo pipefail

          # Derive repo name from owner/repo (github.repository)
          REPO_NAME="\$(basename "${GITHUB_REPOSITORY}")"
          BRANCH="${DEPLOY_BRANCH}"

          echo "::group::📦 Deployment Setup"
          echo "Deploying branch: \${BRANCH}"
          echo "Repository: \${REPO_NAME}"
          echo "Changing directory to /srv/apps"
          cd /srv/apps || { echo "Failed to change directory to /srv/apps"; exit 1; }
          echo "::endgroup::"

          echo "::group::🔄 Syncing Code"
          if [ ! -d "\${REPO_NAME}/.git" ]; then
            echo "Cloning fresh repository..."
            rm -rf "\${REPO_NAME}" || true
            mkdir -p "\${REPO_NAME}" || { echo "Failed to create project directory"; exit 1; }
            cd "\${REPO_NAME}" || { echo "Failed to change directory to project directory"; exit 1; }
            git clone -b \${BRANCH} https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git . || { echo "Failed to clone repository"; exit 1; }
          else
            echo "Updating existing repository..."
            cd "\${REPO_NAME}" || { echo "Failed to change directory to project directory"; exit 1; }
            git fetch origin || { echo "Failed to fetch from origin"; exit 1; }
            git checkout \${BRANCH} || git checkout -b \${BRANCH} origin/\${BRANCH} || { echo "Failed to checkout branch"; exit 1; }
            git reset --hard origin/\${BRANCH} || { echo "Failed to reset to origin/\${BRANCH}"; exit 1; }
          fi
          echo "✓ Code synced successfully"
          echo "::endgroup::"

          echo "::group::🔐 Setting up Environment"
          echo "Creating .env file from CI/CD secrets..."
          cat > .env << 'EOF_ENV'
          POSTGRES_USER=${ENV_POSTGRES_USER}
          POSTGRES_PASSWORD=${ENV_POSTGRES_PASSWORD}
          POSTGRES_DB=${ENV_POSTGRES_DB}
          POSTGRES_PORT=${ENV_POSTGRES_PORT}
          DATABASE_URL=${ENV_DATABASE_URL}

          BACKEND_PORT=${ENV_BACKEND_PORT}
          FRONTEND_PORT=${ENV_FRONTEND_PORT}

          GCP_SERVICE_ACCOUNT_CREDENTIALS=${ENV_GCP_SERVICE_ACCOUNT_CREDENTIALS}
          GCS_BUCKET_NAME=${ENV_GCS_BUCKET_NAME}

          GOOGLE_SPREADSHEET_ID=${ENV_GOOGLE_SPREADSHEET_ID}
          GOOGLE_SHEET_NAME=${ENV_GOOGLE_SHEET_NAME}
          
          BACKUP_RETENTION_DAYS=${ENV_BACKUP_RETENTION_DAYS}
          BACKUP_SCHEDULE_HOUR=${ENV_BACKUP_SCHEDULE_HOUR}
          BACKUP_SCHEDULE_MINUTE=${ENV_BACKUP_SCHEDULE_MINUTE}

          AUTHORIZED_USERS=${ENV_AUTHORIZED_USERS}
          EOF_ENV
          echo "✓ Environment configured"
          echo "::endgroup::"

          echo "::group::🧹 Cleaning up old containers"
          docker compose down --remove-orphans 2>&1 || true
          docker image prune -a -f 2>&1 || true
          docker builder prune -a -f 2>&1 || true
          echo "✓ Cleanup complete"
          echo "::endgroup::"

          echo "::group::🔨 Building Docker Images"
          docker compose build || { echo "::error::Docker build failed"; exit 1; }
          echo "✓ Build complete"
          echo "::endgroup::"

          echo "::group::🚀 Starting Containers"
          docker compose up -d --force-recreate || { echo "::error::Failed to start containers"; exit 1; }
          echo "Waiting for containers to stabilize..."
          sleep 5
          echo "✓ Containers started"
          echo "::endgroup::"

          echo "::group::🗄️  Running Database Migrations"
          docker compose exec -T backend bash -c "cd /app && ./run_migrations.sh" || { echo "::error::Database migration failed"; exit 1; }
          echo "::endgroup::"

          echo "::group::✅ Deployment Status"
          docker compose ps
          echo "::endgroup::"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ Deployment Complete!"
          echo "✓ All migrations applied successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF


