version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./backend/alembic/versions:/app/alembic/versions  # Migration files appear locally
      - ./backend/app:/app/app  # Hot reload for code changes
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  # Enable hot reload

  postgres:
    image: postgres:15
    ports:
      - "${POSTGRES_PORT:-5432}:5432"  # Expose for local DB access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend/src:/app/src  # Hot reload for frontend changes
    depends_on:
      - backend
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: backup/Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:

